<script>
    function login() {
        const cEmail = document.getElementById('email_login').value;
        const cPassword = document.getElementById('password').value;

        const user = {
            email: cEmail,
            password: cPassword
        };

        const options = {
            method: "POST",
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(user)
        };

        fetch("http://localhost:3005/user/login?api_key=1234567", options)
            .then(response => response.json())
            .then(result => checkLogin(result));
    }

    function isLogged() {
        var form = document.getElementById('form');
        if (localStorage.getItem('user_id')) {
            form.classList.add('d-none');
            popola_scheda();
        } else {
            var scheda = document.getElementById('scheda');
            scheda.classList.add('d-none');
            form.classList.remove('d-none');   
        }
    }
    
    function checkLogin(result) {
        var alert = document.getElementById('alert');
        if (result.error) {
            alert.innerHTML = result.error;
            alert.classList.remove('d-none');
        } else {
            localStorage.setItem('user_id', result._id);
            alert.classList.add('d-none');
            var form = document.getElementById('form');
            form.classList.add('d-none');
            popola_scheda()   
        }
    }

    function popola_scheda(){
        const localid = localStorage.getItem('user_id');
        fetch(`http://localhost:3005/user/${localid}?api_key=1234567`)
                .then(response => response.json())
                .then(result => saluta(result))
    }

        const cFilmPreferito = document.getElementById('film_preferito').value = result.film_preferito;
        scheda.classList.remove('d-none');
    }
