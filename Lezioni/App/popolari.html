<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body>

    <nav class="navbar navbar-expand-md bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">PWM</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="popolari.html">Popolari</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link " href="scheda-film.html">Scheda Film</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link " href="utente.html">Profilo Utente</a>
                    </li>

                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row mb-2 mt-2">
            <div class="col-3">
                <input id="pagina" type="number" min="1" value="1" step="1" class="form-control"
                    onchange="cambioPagina();">
            </div>
            <div class="col-3 ">
                <select id="lingua" class="form-select" onchange="cambioLingua();">
                    <option value="en-US">Inglese</option>
                    <option value="it-IT">Italiano</option>
                    <option value="fr-FR">Francese</option>
                    <option value="zh-ZH">Cinese</option>
                </select>
            </div>

            <div class="col-3">
                <div class="input-group">
                    <input id="ricerca" type="text" placeholder="Cerca..." class="form-control ">
                    <button onclick="search()" class="btn btn-outline-primary">Cerca</button>
                </div>
            </div>
        </div>

        <div id="body" class="row">
            <div id="modello" class="col-lg-4 col-md-6 d-none">
                <div class="card">
                    <img src="https://media.themoviedb.org/t/p/w440_and_h660_face" class="card-img-top" alt="">
                    <div class="card-body">
                        <h5 class="card-title"></h5>
                        <p class="card-text"></p>
                        <a href="scheda-film.html?id=" class="btn btn-primary">Scheda Film</a>
                    </div>
                </div>
            </div>


        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script src="lib.js"></script>
    <script>

        mostraPopolari();


    </script>

</body>

</html>
