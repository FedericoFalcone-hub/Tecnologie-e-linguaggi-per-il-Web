<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

</head>

<body>
    <nav class="navbar navbar-expand-md bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">PWM</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link " aria-current="page" href="popolari.html">Popolari</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="scheda-film.html">Scheda Film</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link " href="utente.html">Profilo Utente</a>
                    </li>

                </ul>
            </div>
        </div>
    </nav>

    <div class="container-md">
        <div class="container-md">
            <div class="row">
                <div class="col-md-3">
                    <img id="immagine" class="w-100" src="https://media.themoviedb.org/t/p/w300_and_h450_bestv2/">
                </div>
                <div class="col-md-9">
                    <h1 id="nome"></h1>

                    <div>
                        <h3>Biografia</h3>
                        <p id="biografia"></p>
                    </div>
                </div>
            </div>
            <div>
                <h1>Film </h1>
                <div class="row">
                    <div id="modello" class="col-3 d-none">
                        <div class="card" style="width: 18rem;">
                            <img src="https://media.themoviedb.org/t/p/w440_and_h660_face" class="card-img-top"
                                alt="...">
                            <div class="card-body">
                                <h5 class="card-title"></h5>
                                <p class="card-text"></p>
                                <a href="scheda-film.html?id=" class="btn btn-primary">Scheda Film</a>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script src="lib.js"></script>
    <script>
        var parametri = new URLSearchParams(window.location.search);
        id_attore = parametri.get('id');
        lingua = parametri.get('lingua');



        fetch(`https://api.themoviedb.org/3/person/${id_attore}?language=${lingua}&api_key=${api_key}`)
            .then(res => res.json())
            .then(attore_trovato => {
                document.getElementById('nome').innerHTML = attore_trovato.name;
                document.getElementById('immagine').src += attore_trovato.profile_path;
                document.getElementById('biografia').innerHTML = attore_trovato.biography;

            });
        var modello = document.getElementById('modello');

        fetch(`https://api.themoviedb.org/3/person/${id_attore}/movie_credits?language=${lingua}&api_key=${api_key}`)
            .then(res => res.json())
            .then(credits => {
                var castOrdinato = credits.cast.sort((a, b) => {
                    return (b.popularity || 0) - (a.popularity || 0);
                });

                for (var i = 0; i < castOrdinato.length; i++) {
                    var clone = modello.cloneNode(true);
                    var film = castOrdinato[i];
                    // popoliamo la card

                    clone.getElementsByClassName('card-title')[0].innerHTML += film.original_title;
                    clone.getElementsByClassName('card-text')[0].innerHTML += film.overview;
                    clone.getElementsByTagName('img')[0].src += film.poster_path;
                    clone.getElementsByTagName('a')[0].href += `${film.id}&lingua=${lingua}`;

                    clone.classList.remove('d-none');
                    clone.id = film.id;
                    modello.before(clone);
                }

            });
    </script>

</body>

</html>
