<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body>

    <nav class="navbar navbar-expand-md bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">PWM</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link " aria-current="page" href="popolari.html">Popolari</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="scheda-film.html">Scheda Film</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link " href="utente.html">Profilo Utente</a>
                    </li>

                </ul>
            </div>
        </div>
    </nav>
    <div class="container-md">
        <div class="container-md">
            <div class="row">
                <div class="col-md-3">
                    <img id="immagine" class="w-100" src="https://media.themoviedb.org/t/p/w300_and_h450_bestv2/">
                </div>
                <div class="col-md-9">
                    <h1 id="titolo"></h1>
                    <div class="row">
                        <div id="data" class="col"></div>
                        <div id="generi" class="col"></div>

                    </div>
                    <div>

                        <h3>Overview</h3>
                        <p id="descrizione"></p>
                    </div>
                </div>
            </div>
            <div>
                <h1>Attori</h1>
                <div class="row">
                    <div id="modello" class="col-3 d-none">
                        <div class="card" style="width: 18rem;">
                            <img src="https://media.themoviedb.org/t/p/w440_and_h660_face" class="card-img-top" alt="...">
                            <div class="card-body">
                                <h5 class="card-title"></h5>
                                <p class="card-text"></p>
                                <a href="scheda-attore.html?id=" class="btn btn-primary">Scheda Attore</a>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script src="lib.js"></script>
    <script>
        var parametri = new URLSearchParams(window.location.search);
        id_film = parametri.get('id');
        lingua = parametri.get('lingua');



        fetch(`https://api.themoviedb.org/3/movie/${id_film}?language=${lingua}&api_key=${api_key}`)
            .then(res => res.json())
            .then(film_trovato => {
                document.getElementById('titolo').innerHTML = film_trovato.title;
                document.getElementById('immagine').src += film_trovato.poster_path;
                document.getElementById('data').innerHTML = film_trovato.release_date;
                document.getElementById('generi');
                document.getElementById('descrizione').innerHTML = film_trovato.overview;

            });
        var modello = document.getElementById('modello');

        fetch(`https://api.themoviedb.org/3/movie/${id_film}/credits?language=${lingua}&api_key=${api_key}`)
            .then(res => res.json())
            .then(attori => {
                for (var i = 0; i < attori.cast.length; i++) {
                    var clone = modello.cloneNode(true);
                    var attore = attori.cast[i];
                    // popoliamo la card

                    clone.getElementsByClassName('card-title')[0].innerHTML += attore.character;
                    clone.getElementsByClassName('card-text')[0].innerHTML += attore.name;
                    clone.getElementsByTagName('img')[0].src += attore.profile_path;
                    clone.getElementsByTagName('a')[0].href += `${attore.id}&lingua=${lingua}`;

                    clone.classList.remove('d-none');
                    clone.id = attore.id;
                    modello.before(clone);
                }

            });
    </script>
</body>

</html>
